{% extends "base.html" %}

{% block tabs %}
  {{ super() }}
  <div class="gh-breadcrumb-bar">
    <div class="md-grid">
      <div class="gh-breadcrumb-inner">
        {% if page and page.meta and page.meta.breadcrumb %}
          {{ page.meta.breadcrumb }}
        {% else %}
          U bent hier: <a href="{{ config.site_url | default('/') }}">Home</a> / {{ page.title }}
        {% endif %}
      </div>
    </div>
  </div>
{% endblock %}
