site_name: GoudHaven Roleplay - Wetboek & Regelgeving
site_url: https://regelgeving.goud-haven.nl
site_description: Officiële wet- en regelgeving van GoudHaven Roleplay
site_author: GoudHaven Roleplay

theme:
  name: material
  language: nl
  font:
    text: Inter
    code: JetBrains Mono
  icon:
    logo: material/scale-balance
  palette:
    - scheme: slate
      primary: blue
      accent: light blue
  features:
    - navigation.sections
    - navigation.sections
    - navigation.top
    - navigation.instant
    - navigation.tracking
    - search.highlight
    - search.suggest
    - toc.follow
    - content.code.copy

markdown_extensions:
  - tables
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.superfences
  - toc:
      permalink: false
      toc_depth: 2-3

extra_css:
  - stylesheets/extra.css

nav:
  - Home: index.md
  - Wetboek & Regelgeving:
      - Strafrecht:
          - Wetboek van Strafrecht GoudHaven: WSRGH.md
      - Bijzondere wetten:
          - Wet wapens en munitie GoudHaven: WWMGH.md
          - Opiumwet GoudHaven: OWGH.md
      - Verkeer:
          - Wegenverkeerswet GoudHaven: WVWGH.md
      - Lokale regelgeving:
          - Algemene Plaatselijke Verordening GoudHaven: APV GoudHaven.md